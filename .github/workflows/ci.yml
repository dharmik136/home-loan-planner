name: CI Build & Test Check

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 22
        cache: 'npm'
        cache-dependency-path: web/package-lock.json

    - name: Install Web Dependencies
      run: |
        cd web
        npm ci

    - name: Run Vitest Suite
      run: |
        cd web
        npm test

    - name: Run Vite Production Build
      run: |
        cd web
        npm run build

  build-next-app:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 22
        cache: 'npm'
        cache-dependency-path: next-app/package-lock.json

    - name: Install Next.js App Dependencies
      run: |
        cd next-app
        npm ci

    - name: Build
      run: |
        cd next-app
        npm run build
